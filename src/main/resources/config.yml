settings:
  debug: false
  starting-balance: 100.0
  currency-singular: "coin"
  currency-plural: "coins"
  currency-symbol: "$"
  symbol-before: true
  fractional-digits: 2
  max-pay: 10000.0
  min-pay: 0.01
  pay-fee: 0.0
  pay-fee-type: flat
  pay-cooldown: 3
  log-transactions: true
  auto-save-interval: 300

edit-gui:
  deposit-presets: [100, 1000, 10000]
  withdraw-presets: [100, 1000, 10000]

# Group-aware starting balance. When enabled, new accounts use the
# highest-priority group permission the player holds. Grant via
# permission node `quickeco.group.<name>` (e.g. via LuckPerms).
starting-balance-by-group:
  enabled: false
  groups:
    vip: 500.0
    mvp: 1500.0
    legendary: 5000.0

messages:
  prefix: "&2[QuickEco] &r"
  no-permission: "&cYou don't have permission."
  player-only: "&cOnly players can use this."
  player-not-found: "&cPlayer not found."
  invalid-amount: "&cInvalid amount."
  insufficient-funds: "&cYou don't have enough money."
  unknown-subcommand: "&cUnknown subcommand. Try &e/qe help&c."
  reload: "&aQuickEco reloaded."

  balance: "&aBalance: &e{balance}"
  balance-other: "&e{player}&a's balance: &e{balance}"

  paid: "&aYou paid &e{amount} &ato &e{target}&a."
  received: "&aYou received &e{amount} &afrom &e{sender}&a."
  pay-cooldown: "&cPlease wait before sending another payment."
  pay-self: "&cYou can't pay yourself."
  pay-min: "&cMinimum payment is &e{amount}&c."
  pay-max: "&cMaximum payment is &e{amount}&c."

  gave: "&aGave &e{amount} &ato &e{player}&a."
  took: "&aTook &e{amount} &afrom &e{player}&a."
  set: "&aSet &e{player}&a's balance to &e{amount}&a."
  removed: "&cRemoved &e{player}&c's account."
  no-account: "&c{player} has no account."

  baltop-header: "&6&lBalance Top &7(Top {count})"
  baltop-entry: "&e#{rank} &7{player} &f- &e{balance}"
  baltop-empty: "&cNo balances found."

  edit-opened: "&aOpened editor for &e{player}&a."

  settings-changed: "&aSet &e{key}&a to &e{value}&a."
  settings-unknown-key: "&cUnknown setting key: &e{key}"

  saved: "&aBalances saved."

  import-starting: "&7Starting import from &e{source}&7..."
  import-done: "&aImported &e{imported}&a balances from &e{source}&a. &7({skipped} skipped)"
  import-missing: "&cSource not found: &e{path}"
  import-unknown: "&cUnknown import source: &e{source}&c. Use essentials or cmi."
