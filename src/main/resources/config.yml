# ═══════════════════════════════════════════════════════════════
# QuickEco — Main Configuration
# ═══════════════════════════════════════════════════════════════

settings:
  # Default starting balance for new players
  starting-balance: 100.0

  # Currency
  currency-singular: "coin"
  currency-plural: "coins"
  currency-symbol: "$"
  symbol-before: true
  fractional-digits: 2

  # ── Pay System ──────────────────────────────────────────────
  max-pay: 10000.0
  min-pay: 0.01
  pay-fee: 0.0
  pay-fee-type: flat          # flat | percent
  pay-cooldown: 3

  # ── Interest System ─────────────────────────────────────────
  # Pays interest to online players at a regular interval
  interest-enabled: false
  interest-rate: 0.5           # percentage per interval
  interest-interval: 3600      # seconds (3600 = 1 hour)
  interest-min-balance: 100.0  # minimum to receive interest
  interest-max-balance: 0.0    # 0 = no cap

  # ── Taxation ────────────────────────────────────────────────
  # Withdraw a percentage from all balances on interval
  tax-enabled: false
  tax-rate: 2.0                # percentage
  tax-interval: 86400          # seconds (86400 = 1 day)
  tax-min-balance: 1000.0      # minimum to be taxed
  tax-max-balance: 0.0         # 0 = no cap

  # ── Lottery ─────────────────────────────────────────────────
  # Automatic lottery funded by a percentage of all transactions
  lottery-enabled: false
  lottery-tax-rate: 1.0        # % taken from each deposit/give
  lottery-interval: 43200      # seconds between drawings
  lottery-min-players: 5       # minimum players online to draw
  lottery-max-winners: 3       # top N players split the pot

  # ── Rewards (login streak, vote, playtime) ──────────────────
  rewards:
    login:
      enabled: false
      amount: 50.0
      message: "&aYou received &e{amount} &afor logging in!"
    vote:
      enabled: false
      amount: 100.0
      message: "&aThanks for voting! You earned &e{amount}&a."
    playtime:
      enabled: false
      interval: 3600            # seconds
      amount: 25.0
      message: "&aPlaytime reward: &e{amount}&a!"

  # ── Inflation / Deflation ───────────────────────────────────
  economy:
    # Adjust money supply over time
    inflation-enabled: false
    inflation-rate: 0.1         # % added to all balances per interval
    inflation-interval: 86400
    # Money sink — remove currency from circulation
    sink-enabled: false
    sink-rate: 0.05             # % removed per transaction
    sink-types:                 # which transactions incur sink
      - pay
      - deposit

  # ── Limits ──────────────────────────────────────────────────
  limits:
    max-balance: 0.0            # 0 = unlimited
    max-daily-pay: 0.0          # 0 = unlimited
    max-daily-receive: 0.0      # 0 = unlimited

  # ── Misc ────────────────────────────────────────────────────
  log-transactions: true
  log-level: INFO               # INFO | FINE | WARNING
  auto-save-interval: 300       # seconds between automatic saves

storage:
  type: yaml                    # yaml | sqlite (coming soon)

# ── Bank Accounts ──────────────────────────────────────────────
# Full bank system — players can create named accounts with separate balances
bank:
  enabled: false
  max-accounts: 3
  default-account-name: "Personal"
  account-cost: 0.0              # one-time fee to open an account
  interest-enabled: false
  interest-rate: 1.0             # percentage per interval
  interest-interval: 43200       # seconds
  withdraw-limit: 0.0            # 0 = unlimited per transaction
  deposit-limit: 0.0             # 0 = unlimited per transaction

# ── Transaction Log ────────────────────────────────────────────
# Logs are stored per-player in data/transactions/
logging:
  enabled: true
  keep-days: 30                  # delete logs older than this
  log-pay: true
  log-deposit: true
  log-withdraw: true
  log-admin: true
  log-interest: true
  log-lottery: true

# ── QuickCrates Integration ────────────────────────────────────
quickcrates:
  enabled: true

messages:
  prefix: "&2[QuickEco] &r"
  no-permission: "&cYou don't have permission for that."
  player-not-found: "&cPlayer not found."
  invalid-amount: "&cInvalid amount."
  insufficient-funds: "&cYou don't have enough money."
  balance: "&aBalance: &e{balance}"
  balance-other: "&e{player}&a's balance: &e{balance}"
  paid: "&aYou paid &e{amount} &ato &e{target}&a."
  received: "&aYou received &e{amount} &afrom &e{sender}&a."
  gave: "&aGave &e{amount} &ato &e{player}&a."
  took: "&aTook &e{amount} &afrom &e{player}&a."
  set: "&aSet &e{player}&a's balance to &e{amount}&a."
  reload: "&aQuickEco reloaded."
  baltop-header: "&6&lBalance Top &7(Top {count})"
  baltop-entry: "&e#{rank} &7{player} &f- &e{balance}"
  pay-cooldown: "&cPlease wait before sending another payment."
  deposit: "&aDeposited &e{amount}&a."
  withdraw: "&aWithdrew &e{amount}&a."
  interest: "&aYou earned &e{amount} &ain interest!"
  tax: "&cYou were taxed &e{amount}&c."
  lottery-win: "&6&lLOTTERY! &eYou won &6{amount}&e!"
  lottery-no-ticket: "&cYou don't have enough money for a lottery ticket."
  bank-create: "&aBank account &e{name} &acreated."
  bank-delete: "&cBank account &e{name} &cdeleted."
  bank-list: "&eYour bank accounts:"
  bank-balance: "&e{name}&a: &e{balance}"
