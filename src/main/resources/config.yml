settings:
  starting-balance: 100.0
  currency-singular: "coin"
  currency-plural: "coins"
  currency-symbol: "$"
  symbol-before: true
  fractional-digits: 2
  max-pay: 10000.0
  min-pay: 0.01
  pay-fee: 0.0
  pay-fee-type: flat
  pay-cooldown: 3
  interest-enabled: false
  interest-rate: 0.5
  interest-interval: 3600
  interest-min-balance: 100.0
  interest-max-balance: 0.0
  tax-enabled: false
  tax-rate: 2.0
  tax-interval: 86400
  tax-min-balance: 1000.0
  tax-max-balance: 0.0
  lottery-enabled: false
  lottery-tax-rate: 1.0
  lottery-interval: 43200
  lottery-min-players: 5
  lottery-max-winners: 3
  rewards:
    login:
      enabled: false
      amount: 50.0
      message: "&aYou received &e{amount} &afor logging in!"
    vote:
      enabled: false
      amount: 100.0
      message: "&aThanks for voting! You earned &e{amount}&a."
    playtime:
      enabled: false
      interval: 3600
      amount: 25.0
      message: "&aPlaytime reward: &e{amount}&a!"
  economy:
    inflation-enabled: false
    inflation-rate: 0.1
    inflation-interval: 86400
    sink-enabled: false
    sink-rate: 0.05
    sink-types:
      - pay
      - deposit
  limits:
    max-balance: 0.0
    max-daily-pay: 0.0
    max-daily-receive: 0.0
  log-transactions: true
  log-level: INFO
  auto-save-interval: 300

storage:
  type: yaml

bank:
  enabled: false
  max-accounts: 3
  default-account-name: "Personal"
  account-cost: 0.0
  interest-enabled: false
  interest-rate: 1.0
  interest-interval: 43200
  withdraw-limit: 0.0
  deposit-limit: 0.0

logging:
  enabled: true
  keep-days: 30
  log-pay: true
  log-deposit: true
  log-withdraw: true
  log-admin: true
  log-interest: true
  log-lottery: true

quickcrates:
  enabled: true

messages:
  prefix: "&2[QuickEco] &r"
  no-permission: "&cYou don't have permission for that."
  player-not-found: "&cPlayer not found."
  invalid-amount: "&cInvalid amount."
  insufficient-funds: "&cYou don't have enough money."
  balance: "&aBalance: &e{balance}"
  balance-other: "&e{player}&a's balance: &e{balance}"
  paid: "&aYou paid &e{amount} &ato &e{target}&a."
  received: "&aYou received &e{amount} &afrom &e{sender}&a."
  gave: "&aGave &e{amount} &ato &e{player}&a."
  took: "&aTook &e{amount} &afrom &e{player}&a."
  set: "&aSet &e{player}&a's balance to &e{amount}&a."
  reload: "&aQuickEco reloaded."
  baltop-header: "&6&lBalance Top &7(Top {count})"
  baltop-entry: "&e#{rank} &7{player} &f- &e{balance}"
  pay-cooldown: "&cPlease wait before sending another payment."
  deposit: "&aDeposited &e{amount}&a."
  withdraw: "&aWithdrew &e{amount}&a."
  interest: "&aYou earned &e{amount} &ain interest!"
  tax: "&cYou were taxed &e{amount}&c."
  lottery-win: "&6&lLOTTERY! &eYou won &6{amount}&e!"
  lottery-no-ticket: "&cYou don't have enough money for a lottery ticket."
  bank-create: "&aBank account &e{name} &acreated."
  bank-delete: "&cBank account &e{name} &cdeleted."
  bank-list: "&eYour bank accounts:"
  bank-balance: "&e{name}&a: &e{balance}"